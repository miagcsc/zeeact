<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#E63950" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>ZeeActs — Complaint Management & IT Solutions Pakistan</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://zeeacts.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZeeActs" />
    <meta property="og:title" content="ZeeActs — Complaint Management & IT Solutions Pakistan" />
    <meta property="og:description" content="ZeeActs builds complaint management systems, HVAC field service software, custom ERP, and AI-powered automation for Pakistani businesses. Deployed in days, not months." />
    <meta property="og:image" content="https://zeeacts.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ZeeActs — Software That Builds. AI That Scales." />
    <meta property="og:url" content="https://zeeacts.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@zeeacts" />
    <meta name="twitter:title" content="ZeeActs — Complaint Management & IT Solutions Pakistan" />
    <meta name="twitter:description" content="Complaint management systems, HVAC software, ERP & AI automation for Pakistani businesses. Fast delivery, enterprise quality." />
    <meta name="twitter:image" content="https://zeeacts.com/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts: preconnect then load non-blocking via media=print swap trick -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" /></noscript>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ZeeActs",
      "url": "https://zeeacts.com",
      "logo": "https://zeeacts.com/favicon.svg",
      "description": "ZeeActs builds complaint management systems, HVAC field service software, custom ERP, and AI-powered automation for Pakistani businesses.",
      "sameAs": [],
      "areaServed": {
        "@type": "Country",
        "name": "Pakistan"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "areaServed": "PK",
        "availableLanguage": ["English", "Urdu"]
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ZeeActs",
      "url": "https://zeeacts.com",
      "description": "Premium complaint management systems and IT solutions for Pakistani businesses.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://zeeacts.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication (HVAC Complaint Management) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AeroSoft OS — HVAC Complaint Management System",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Android, iOS",
      "url": "https://zeeacts.com/solutions/hvac",
      "description": "AeroSoft OS is a complete HVAC complaint management system for Pakistani field service companies. Log complaints, dispatch technicians, track jobs end-to-end, and manage inventory from one dashboard.",
      "featureList": [
        "HVAC complaint management",
        "Technician dispatch and tracking",
        "Job scheduling and AMC management",
        "Customer self-service portal",
        "Inventory and parts tracking",
        "Business analytics dashboard",
        "WhatsApp integration",
        "Multi-branch management"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "PKR",
        "description": "Free demo available"
      },
      "creator": {
        "@type": "Organization",
        "name": "ZeeActs",
        "url": "https://zeeacts.com"
      }
    }
    </script>
    <script src="/env.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
