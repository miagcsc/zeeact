kind = "web"
previewPath = "/"
title = "ZeeActs Website"
version = "1.0.0"
id = "artifacts/zeeacts-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23373

[services.development]
run = "pnpm --filter @workspace/zeeacts-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeeacts-website", "run", "build" ]
publicDir = "artifacts/zeeacts-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23373"
BASE_PATH = "/"
