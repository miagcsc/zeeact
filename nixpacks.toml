[variables]
# Match `artifacts/api-server/Dockerfile` (node:20-slim)
NIXPACKS_NODE_VERSION = "20"

# This repo intentionally installs with `--no-frozen-lockfile` in CI/build environments
# because pnpm's lockfile strictness can fail across differing pnpm/node environments.
# Railway already uses `--no-frozen-lockfile` (see `railway.toml`).
[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm run typecheck",
  "pnpm --filter @workspace/zeeacts-website run build",
  "pnpm --filter @workspace/api-server run build"
]

# Same as `railway.toml` [deploy] startCommand — root `package.json` "start" does not run DB migrate.
[start]
cmd = "NODE_ENV=${NODE_ENV:-production} sh -c 'if [ \"${RUN_DB_PUSH_ON_BOOT:-true}\" = \"true\" ]; then pnpm --filter @workspace/db run push; fi; node artifacts/api-server/dist/index.mjs'"
