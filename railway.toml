[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/zeeacts-website run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push-force && node artifacts/api-server/dist/index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
